<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AeroShield 3D</title>
    <style>
      #boot-screen {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #08080a;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: ui-monospace, "JetBrains Mono", "Roboto Mono", monospace;
      }
      #boot-screen .boot-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }
      #boot-screen .boot-logo {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.2em;
        color: #39ff14;
        text-shadow: 0 0 8px rgba(57, 255, 20, 0.4);
      }
      #boot-screen .boot-sub {
        font-size: 9px;
        letter-spacing: 0.16em;
        color: #5a6770;
      }
      #boot-screen .boot-ring {
        width: 48px;
        height: 48px;
        border: 1px solid rgba(57, 255, 20, 0.2);
        border-top-color: #39ff14;
        border-radius: 50%;
        animation: boot-spin 0.8s linear infinite;
      }
      @keyframes boot-spin {
        to { transform: rotate(360deg); }
      }
      #boot-screen .boot-bar {
        width: 180px;
        height: 2px;
        background: rgba(57, 255, 20, 0.1);
        overflow: hidden;
      }
      #boot-screen .boot-bar-fill {
        height: 100%;
        width: 30%;
        background: #39ff14;
        animation: boot-slide 1.2s ease-in-out infinite;
      }
      @keyframes boot-slide {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(400%); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="boot-screen">
      <div class="boot-inner">
        <div class="boot-ring"></div>
        <div class="boot-logo">AEROSHIELD</div>
        <div class="boot-sub">INITIALIZING TACTICAL TELEMETRY</div>
        <div class="boot-bar"><div class="boot-bar-fill"></div></div>
      </div>
    </div>
    <script>
      window.__removeBootScreen = function() {
        var el = document.getElementById("boot-screen");
        if (el) {
          el.style.transition = "opacity 0.4s ease";
          el.style.opacity = "0";
          setTimeout(function() { el.remove(); }, 400);
        }
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
